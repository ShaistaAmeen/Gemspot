<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join — GemSpot</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <i class="fas fa-map-marker-alt"></i> GemSpot
    </div>
    <div class="nav-links">
      <a href="index.html">Map</a>
      <a href="login.html">Login</a>
      <a href="register.html">Join</a>
    </div>
  </nav>

  <!-- REGISTER FORM -->
  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <h2>Become a Scout</h2>
      <p class="auth-sub">Join the community discovering hidden gems</p>

      <div id="error-msg" class="error-msg" style="display:none;"></div>
      <div id="success-msg" class="success-msg" style="display:none;"></div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="name" placeholder="Your name"/>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary full-width" onclick="registerUser()">
        <i class="fas fa-rocket"></i> Create Account
      </button>

      <p class="auth-switch">
        Already a Scout? <a href="login.html">Login here</a>
      </p>
    </div>
  </section>

  <script src="js/auth.js"></script>
</body>
</html>
