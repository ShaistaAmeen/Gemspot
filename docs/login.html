<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — GemSpot</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">
      <i class="fas fa-map-marker-alt"></i> GemSpot
    </div>
    <div class="nav-links">
      <a href="index.html">Map</a>
      <a href="login.html">Login</a>
      <a href="register.html">Join</a>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-icon">
        <i class="fas fa-map-marker-alt"></i>
      </div>
      <h2>Welcome Back, Scout</h2>
      <p class="auth-sub">Log in to discover and share hidden gems</p>

      <div id="error-msg" class="error-msg" style="display:none;"></div>
      <div id="success-msg" class="success-msg" style="display:none;"></div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary full-width" onclick="loginUser()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Join as a Scout</a>
      </p>
    </div>
  </section>

  <script src="js/auth.js"></script>
</body>
</html>
